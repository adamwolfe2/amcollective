# Fly.io config for Hermes Agent (AM Collective)
# Background worker — outbound Slack websocket only, no inbound HTTP.
# Cost: shared-cpu-1x @ 256MB ≈ $1.94/mo + $0.15/mo for 1GB volume.

app = "hermes-am-collective"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Persistent state: ~/.hermes (skills, memory, session sqlite DB)
[mounts]
  source = "hermes_state"
  destination = "/root/.hermes"
  initial_size = "1gb"

# VM size — shared-cpu-1x with 256MB is enough for a Slack bot
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[env]
  PYTHONUNBUFFERED = "1"
  HOME = "/root"

# Fly requires at least one port for validation even on background workers.
# We bind a tiny health-check server on 8080 inside the container;
# Fly will probe it so we get proper health status in the dashboard.
[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [[services.ports]]
    port = 8080

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    path = "/health"
